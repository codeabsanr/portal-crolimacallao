<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Convenios Institucionales | Colegio Regional de Obstetras III</title>
    <!-- Tailwind CSS (Direct for performance) -->
    <link href="../../assets/css/tailwind-pro.css" rel="stylesheet" />
    
    <link href="../../assets/css/styles.css" rel="stylesheet" />
    <!-- Component Loader -->
    <script src="../../assets/js/components.js" defer></script>
</head>

<body
    class="bg-background-light dark:bg-background-dark text-slate-800 dark:text-slate-100 font-sans antialiased transition-colors duration-200" data-active-page="institucion">
    <div data-include="navbar"></div>
    <main id="main" class="min-h-screen bg-slate-50 dark:bg-slate-900 pb-16">
        <!-- Simplified Header/Hero for Subpages -->
        <div class="bg-primary text-white py-12 md:py-16 shadow-inner">
            <div class="max-w-4xl mx-auto px-6">
                <div class="flex items-center gap-4 mb-4">
                    <span class="material-icons-outlined text-4xl opacity-80">handshake</span>
                    <h1 class="text-3xl md:text-5xl font-extrabold">Convenios Institucionales</h1>
                </div>
                <p class="text-lg md:text-xl opacity-90">Alianzas estratégicas en beneficio de los colegiados
                    habilitados.</p>
            </div>
        </div>

        <!-- Main Content Area with isolated semantic tags -->
        <div class="max-w-4xl mx-auto px-6 mt-12">

            <section id="convenios-universidad" class="mb-12">
                <h2 class="text-3xl font-bold text-slate-900 border-l-4 border-primary pl-4 mb-6">Convenios Académicos
                </h2>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div class="bg-white border rounded-lg p-6 shadow-sm flex items-start gap-4">
                        <div class="p-3 bg-primary/5 text-primary rounded-lg">
                            <span class="material-icons-outlined text-2xl">school</span>
                        </div>
                        <div>
                            <h3 class="font-bold text-lg mb-2">[Nombre Universidad]</h3>
                            <p class="text-slate-600 text-sm">Descuento del 15% en maestrías y diplomados para
                                colegiados habilitados.</p>
                        </div>
                    </div>
                </div>
            </section>


            <div class="mt-12 flex justify-start">
                <a href="javascript:history.back()"
                    class="inline-flex items-center text-primary font-bold hover:underline">
                    <span class="material-icons-outlined mr-1">arrow_back</span> Regresar
                </a>
            </div>
        </div>
    <div data-include="support"></div>
    </main>
    <div data-include="footer"></div>
    </body>

</html>
