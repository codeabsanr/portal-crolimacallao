<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Buscador de Colegiados | Colegio Regional de Obstetras III</title>
    <!-- Tailwind CSS (Direct for performance) -->
    <link href="../../assets/css/tailwind-pro.css" rel="stylesheet" />
    
    <link href="../../assets/css/styles.css" rel="stylesheet" />
    <!-- Component Loader -->
    <script src="../../assets/js/components.js" defer></script>
</head>

<body
    class="bg-background-light dark:bg-background-dark text-slate-800 dark:text-slate-100 font-sans antialiased transition-colors duration-200" data-active-page="colegiados">
    <div data-include="navbar"></div>
    <main id="main" class="min-h-screen bg-slate-50 dark:bg-slate-900 pb-16">
        <!-- Simplified Header/Hero for Subpages -->
        <div class="bg-primary text-white py-12 md:py-16 shadow-inner">
            <div class="max-w-4xl mx-auto px-6">
                <div class="flex items-center gap-4 mb-4">
                    <span class="material-icons-outlined text-4xl opacity-80">person_search</span>
                    <h1 class="text-3xl md:text-5xl font-extrabold">Buscador de Colegiados</h1>
                </div>
                <p class="text-lg md:text-xl opacity-90">Consulta pública de habilidad de obstetras.</p>
            </div>
        </div>
        
        <!-- Main Content Area with isolated semantic tags -->
        <div class="max-w-4xl mx-auto px-6 mt-12">
            <section id="buscador-publico"><div class="max-w-xl mx-auto bg-white p-8 rounded border shadow-sm"><h2 class="font-bold text-xl mb-4 text-center">Ingrese el número de COP o DNI</h2><div class="flex gap-2"><input type="text" class="flex-grow border p-3 rounded" placeholder="Ej. 12345"><button class="bg-primary text-white px-6 font-bold rounded">Buscar</button></div></div></section>
            
            <div class="mt-12 flex justify-start">
                <a href="javascript:history.back()" class="inline-flex items-center text-primary font-bold hover:underline">
                    <span class="material-icons-outlined mr-1">arrow_back</span> Regresar
                </a>
            </div>
        </div>
    <div data-include="support"></div>
    </main>
    <div data-include="footer"></div>
    </body>

</html>
