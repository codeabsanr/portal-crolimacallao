<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Noticias - Colegio Regional de Obstetras III Lima-Callao</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,typography"></script>
    <script src="../../assets/js/tailwind-config.js"></script>
    <link href="../../assets/css/styles.css" rel="stylesheet" />
</head>

<body
    class="bg-background-light dark:bg-background-dark text-slate-800 dark:text-slate-100 font-sans antialiased transition-colors duration-200">
    <main id="main" class="pt-10">
        <section class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-12">
            <h1 class="text-4xl font-extrabold text-slate-900 dark:text-white mb-8 border-l-4 border-primary pl-4">
                Noticias y Comunicados</h1>
            <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
                <!-- Example News Item -->
                <article
                    class="bg-surface-light dark:bg-surface-dark rounded-md overflow-hidden shadow-sm border border-slate-200 dark:border-slate-800 group">
                    <div
                        class="aspect-video bg-slate-200 dark:bg-slate-700 flex items-center justify-center text-slate-400">
                        <span class="material-icons-outlined text-4xl">image</span>
                    </div>
                    <div class="p-6">
                        <span
                            class="text-xs font-bold text-primary uppercase tracking-widest mb-2 block">Comunicado</span>
                        <h2 class="text-xl font-bold mb-3 group-hover:text-primary transition-colors">Nuevo horario de
                            atención en la sede central</h2>
                        <p class="text-slate-600 dark:text-slate-400 mb-4 line-clamp-2">Informamos a todos los
                            colegiados que a partir del próximo mes contaremos con horario extendido...</p>
                        <time class="text-sm text-slate-500">21 de Febrero, 2026</time>
                    </div>
                </article>
            </div>
        </section>
    </main>
</body>

</html>
